services:
  # ------------------------------------
  # 1. Message Broker & Background Queue
  # ------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------
  # 2. Database (Simulating Supabase/PostgreSQL)
  # ------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supabase_password
      POSTGRES_DB: autonomous_db
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d autonomous_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------
  # 3. Search Indexing
  # ------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=master_search_key
    ports:
      - 7700:7700

  # ------------------------------------
  # 4. Telemetry & Monitoring
  # ------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - 9090:9090
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - 3001:3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # ------------------------------------
  # 5. Core AI Perception Engine (FastAPI)
  # ------------------------------------
  ai_inference:
    build:
      context: ./ai_service
    ports:
      - 8001:8001
    volumes:
      - ./ai_service:/app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ------------------------------------
  # 6. Django API Gateway (ASGI with Daphne)
  # ------------------------------------
  backend-gateway:
    build:
      context: ./backend
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:supabase_password@postgres:5432/autonomous_db
      - REDIS_URL=redis://redis:6379/1
      - REDIS_HOST=redis

  # ------------------------------------
  # 7. Django Celery Worker
  # ------------------------------------
  backend_worker:
    build:
      context: ./backend
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/1
      - DATABASE_URL=postgres://admin:supabase_password@postgres:5432/autonomous_db

  # ------------------------------------
  # 8. Next.js 3D Frontend
  # ------------------------------------
  frontend:
    build:
      context: ./frontend
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8001

volumes:
  postgres_data:
